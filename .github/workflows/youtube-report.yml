name: Weekly YouTube Optimization Report

on:
  schedule:
    # Runs every Sunday at 6 AM UTC (1 AM EST / 2 AM EDT)
    - cron: '0 6 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install axios nodemailer nodemailer-smtp-transport dotenv pdfkit

      - name: Generate YouTube Report
        env:
          VIDIQ_API_KEY: ${{ secrets.VIDIQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          ICLOUD_EMAIL: ${{ secrets.ICLOUD_EMAIL }}
          ICLOUD_APP_PASSWORD: ${{ secrets.ICLOUD_APP_PASSWORD }}
        run: node scripts/generate-report.js

      - name: Upload PDF to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-report-pdf
          path: reports/youtube-report-*.pdf
          retention-days: 30

      - name: Commit and push report
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/ || true
          git commit -m "Weekly YouTube report - $(date +%Y-%m-%d)" || true
          git push || true
